[service]
  log_level = "info"

[listener]
  [listener.0]
    ip = "0.0.0.0"
    port = 53

    [listener.0.policy]
      name = "NextDNS VLAN Routing"

      networks = [
        {"network.0" = ["upstream.0"]},
        {"network.1" = ["upstream.1"]},
        {"network.2" = ["upstream.2"]},
        {"network.3" = ["upstream.3"]},
        {"network.4" = ["upstream.4"]},
        {"network.5" = ["upstream.5"]},
        {"network.6" = ["upstream.6"]},
        {"network.7" = ["upstream.0"]},
        {"network.8" = ["upstream.0"]},
        {"network.9" = ["upstream.0"]}
      ]

      rules = [
        {"*.home.neffroad.net" = ["upstream.7"]},
        {"*.in-addr.arpa" = ["upstream.7"]},
        {"*.ip6.arpa" = ["upstream.7"]}
      ]

[network]
  [network.0]
    name = "Trusted"
    cidrs = ["172.16.30.0/24"]

  [network.1]
    name = "Streaming"
    cidrs = ["172.16.40.0/24"]

  [network.2]
    name = "Guest"
    cidrs = ["172.16.50.0/24"]

  [network.3]
    name = "IoT"
    cidrs = ["172.16.60.0/24"]

  [network.4]
    name = "Gaming"
    cidrs = ["172.16.70.0/24"]

  [network.5]
    name = "Kids"
    cidrs = ["172.16.80.0/24"]

  [network.6]
    name = "Jailed"
    cidrs = ["172.16.90.0/24"]

  [network.7]
    name = "Management"
    cidrs = ["10.10.10.0/24"]

  [network.8]
    name = "Admin"
    cidrs = ["172.16.20.0/24"]

  [network.9]
    name = "Homelab"
    cidrs = ["172.18.0.0/21"]

[upstream]
  [upstream.0]
    name = "NextDNS-Trusted"
    type = "doh"
    endpoint = "https://dns.nextdns.io/fe1de8"
    timeout = 5000

  [upstream.1]
    name = "NextDNS-Streaming"
    type = "doh"
    endpoint = "https://dns.nextdns.io/5de59e"
    timeout = 5000

  [upstream.2]
    name = "NextDNS-Guest"
    type = "doh"
    endpoint = "https://dns.nextdns.io/17ab72"
    timeout = 5000

  [upstream.3]
    name = "NextDNS-IoT"
    type = "doh"
    endpoint = "https://dns.nextdns.io/248e3b"
    timeout = 5000

  [upstream.4]
    name = "NextDNS-Gaming"
    type = "doh"
    endpoint = "https://dns.nextdns.io/144a44"
    timeout = 5000

  [upstream.5]
    name = "NextDNS-Kids"
    type = "doh"
    endpoint = "https://dns.nextdns.io/d7a4ac"
    timeout = 5000

  [upstream.6]
    name = "NextDNS-Jailed"
    type = "doh"
    endpoint = "https://dns.nextdns.io/ea699a"
    timeout = 5000

  [upstream.7]
    name = "Local-Unbound"
    type = "legacy"
    endpoint = "127.0.0.1:10053"
    timeout = 5000
