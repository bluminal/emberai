site_name: Netex Suite Documentation
site_description: >-
  Documentation for the Netex network intelligence suite —
  UniFi, OPNsense, and cross-vendor orchestration plugins for EmberAI.
site_url: https://bluminal.github.io/emberai
repo_url: https://github.com/bluminal/emberai
repo_name: bluminal/emberai
edit_uri: edit/main/docs/site/

docs_dir: site
site_dir: site_build

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Authentication: getting-started/authentication.md
      - Quick Start: getting-started/quick-start.md
      - Safety & Human Supervision: getting-started/safety.md
  - UniFi Plugin:
      - Overview: unifi/overview.md
      - Commands: unifi/commands.md
      - Skills: unifi/skills.md
      - Workflows:
          - First-Time Site Scan: unifi/workflows/first-time-scan.md
          - Daily Health Check: unifi/workflows/daily-health-check.md
          - Locate a Client: unifi/workflows/locate-client.md
          - Check WiFi Channels: unifi/workflows/check-wifi-channels.md
          - Firmware Update Status: unifi/workflows/firmware-update-status.md
  - Reference:
      - Environment Variables: reference/environment-variables.md
      - Write Safety: reference/write-safety.md
