site_name: Netex Suite Documentation
site_description: >-
  Documentation for the Netex network intelligence suite —
  UniFi, OPNsense, and cross-vendor orchestration plugins for EmberAI.
site_url: https://bluminal.github.io/emberai
repo_url: https://github.com/bluminal/emberai
repo_name: bluminal/emberai
edit_uri: edit/main/docs/site/

docs_dir: site
site_dir: site_build

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - ../unifi/src
            - ../opnsense/src
            - ../netex/src
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 3
            members_order: source
            docstring_style: google
            show_if_no_docstring: false
            annotations_path: brief

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Authentication: getting-started/authentication.md
      - Quick Start: getting-started/quick-start.md
      - Connectivity: getting-started/connectivity.md
      - Safety & Human Supervision: getting-started/safety.md
  - UniFi Plugin:
      - Overview: unifi/overview.md
      - Commands: unifi/commands.md
      - Skills: unifi/skills.md
      - Workflows:
          - First-Time Site Scan: unifi/workflows/first-time-scan.md
          - Daily Health Check: unifi/workflows/daily-health-check.md
          - Locate a Client: unifi/workflows/locate-client.md
          - Check WiFi Channels: unifi/workflows/check-wifi-channels.md
          - Firmware Update Status: unifi/workflows/firmware-update-status.md
  - OPNsense Plugin:
      - Overview: opnsense/overview.md
      - Commands: opnsense/commands.md
      - Skills: opnsense/skills.md
      - Workflows:
          - First-Time System Scan: opnsense/workflows/first-time-scan.md
          - Review Firewall Rules: opnsense/workflows/review-firewall.md
          - Check VPN Health: opnsense/workflows/check-vpn-health.md
          - Troubleshoot DNS: opnsense/workflows/troubleshoot-dns.md
          - DHCP Lease Audit: opnsense/workflows/dhcp-lease-audit.md
          - Routing Black Hole: opnsense/workflows/routing-black-hole.md
          - Full Firewall Audit: opnsense/workflows/full-firewall-audit.md
          - WireGuard Peer: opnsense/workflows/wireguard-peer.md
          - Traffic Shaping: opnsense/workflows/traffic-shaping.md
          - IDS/IPS Triage: opnsense/workflows/ids-triage.md
  - Netex Plugin:
      - Overview: netex/overview.md
      - Abstract Data Model: netex/abstract-model.md
      - Commands: netex/commands.md
      - Netex vs Autonomous: netex/netex-vs-autonomous.md
      - Workflows:
          - Unified Health Check: netex/workflows/unified-health.md
          - VLAN Audit: netex/workflows/vlan-audit.md
          - Topology Map: netex/workflows/topology.md
          - Neffroad Provisioning: netex/workflows/neffroad-provision.md
          - Guest WiFi Isolation: netex/workflows/guest-wifi-isolation.md
          - Cross-VLAN Troubleshooting: netex/workflows/cross-vlan-troubleshooting.md
          - Post-Change Policy Sync: netex/workflows/post-change-policy-sync.md
          - New Site Onboarding: netex/workflows/new-site-onboarding.md
  - Reference:
      - Environment Variables: reference/environment-variables.md
      - Write Safety: reference/write-safety.md
