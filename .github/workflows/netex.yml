name: netex CI

on:
  push:
    branches: [main]
    paths:
      - "netex/**"
      - "contract/**"
  pull_request:
    paths:
      - "netex/**"
      - "contract/**"

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: netex/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./netex"
          pip install pytest pytest-asyncio coverage ruff mypy

      - name: Lint (ruff check)
        run: ruff check netex/

      - name: Format check (ruff format)
        run: ruff format --check netex/

      - name: Type check (mypy)
        run: mypy netex/src/netex/

      - name: Run tests with coverage
        run: pytest netex/tests/ --cov=netex --cov-report=term-missing --cov-fail-under=80
