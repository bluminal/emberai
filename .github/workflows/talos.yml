name: talos CI

on:
  push:
    branches: [main]
    paths:
      - "talos/**"
  pull_request:
    paths:
      - "talos/**"

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: talos/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./talos"
          pip install pytest pytest-asyncio pytest-cov coverage ruff mypy

      - name: Lint (ruff check)
        run: ruff check talos/

      - name: Format check (ruff format)
        run: ruff format --check talos/

      - name: Type check (mypy)
        run: mypy talos/src/talos/

      - name: Run tests with coverage
        run: pytest talos/tests/ --cov=talos --cov-report=term-missing --cov-fail-under=80
