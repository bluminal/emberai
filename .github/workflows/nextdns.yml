name: nextdns CI

on:
  push:
    branches: [main]
    paths:
      - "nextdns/**"
  pull_request:
    paths:
      - "nextdns/**"

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: nextdns/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./nextdns"
          pip install pytest pytest-asyncio pytest-cov coverage ruff mypy

      - name: Lint (ruff check)
        run: ruff check nextdns/

      - name: Format check (ruff format)
        run: ruff format --check nextdns/

      - name: Type check (mypy)
        run: mypy nextdns/src/nextdns/

      - name: Run tests with coverage
        run: pytest nextdns/tests/ --cov=nextdns --cov-report=term-missing --cov-fail-under=80
