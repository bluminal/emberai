name: opnsense CI

on:
  push:
    branches: [main]
    paths:
      - "opnsense/**"
  pull_request:
    paths:
      - "opnsense/**"

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: opnsense/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./opnsense"
          pip install pytest pytest-asyncio coverage ruff mypy

      - name: Lint (ruff check)
        run: ruff check opnsense/

      - name: Format check (ruff format)
        run: ruff format --check opnsense/

      - name: Type check (mypy)
        run: mypy opnsense/src/opnsense/

      - name: Run tests with coverage
        run: pytest opnsense/tests/ --cov=opnsense --cov-report=term-missing --cov-fail-under=80
